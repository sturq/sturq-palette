system: "base16"
name: "Sturq OLED"
author: "sturq"
slug: "sturq-oled"
variant: "dark"
palette:
  # Surfaces — OLED-friendly dark ramp, default fg = Termux bright white.
  base00: "000000"  # mantle    — default bg (pure black, matches Termux bg)
  base01: "1c1c1c"  # base      — lighter bg / status line
  base02: "2A3042"  # surface0  — selection / dark blue tint
  base03: "7f7f7f"  # surface1  — comments / line numbers (Termux bright-black)
  base04: "b2b2b2"  # overlay2  — dim foreground
  base05: "e5e5e5"  # text      — default foreground (Termux white)
  base06: "f5f5f5"  # subtext1  — light foreground
  base07: "ffffff"  # subtext0  — brightest foreground (Termux bright-white)
  # Accents — Termux default ANSI colours mapped to base16 slots.
  base08: "cd0000"  # red       — variables, errors           (Termux red)
  base09: "cd5c00"  # orange    — integers, constants         (interpolated red↔yellow)
  base0A: "cdcd00"  # yellow    — classes, warnings           (Termux yellow)
  base0B: "00cd00"  # green     — strings, success            (Termux green)
  base0C: "00cdcd"  # cyan      — support, regex              (Termux cyan)
  base0D: "0000ee"  # blue      — functions, info             (Termux blue, primary accent)
  base0E: "cd00cd"  # magenta   — keywords                    (Termux magenta)
  base0F: "800000"  # maroon    — deprecated, embedded        (darker red)
